[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    live: marks tests that call real APIs (deselect with '-m "not live"')
    hardware: marks tests that require Pi hardware mocks

# Coverage config lives in .coveragerc (coverage.py doesn't read pytest.ini).
# Run: venv/bin/python -m pytest --cov --cov-branch --cov-report=term --cov-report=html
