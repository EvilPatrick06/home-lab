# Parity with local: cd bmo/pi && python -m pytest tests/ -q
name: bmo / pi pytest

on:
  push:
    branches: [master, main]
    paths:
      - 'bmo/**'
      - '.github/workflows/bmo-pi-pytest.yml'
  pull_request:
    paths:
      - 'bmo/**'
      - '.github/workflows/bmo-pi-pytest.yml'

concurrency:
  group: bmo-pi-pytest-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: bmo/pi

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            bmo/pi/requirements-ci.txt
            bmo/pi/requirements-test.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            portaudio19-dev \
            libsndfile1 \
            ffmpeg \
            vlc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements-ci.txt
          python -m pip install -r requirements-test.txt

      - name: Pytest
        env:
          BMO_SOCKETIO_ASYNC_MODE: threading
        run: python -m pytest tests/ -q
