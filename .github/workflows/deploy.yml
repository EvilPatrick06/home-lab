name: Deploy Dungeon Scholar to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'dungeon-scholar/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dungeon-scholar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dungeon-scholar/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # GitHub Pages serves under /<repo-name>/. This owner's repo is
          # `home-lab` (monorepo), so we override the default. Forks whose
          # repo is named `dungeon-scholar` can delete this line entirely —
          # vite.config.js defaults to `/dungeon-scholar/`. Forks with any
          # other repo name should change `/home-lab/` here to `/<their-repo>/`.
          VITE_BASE: /home-lab/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dungeon-scholar/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
