name: Release

# Triggered by pushing a `v*` tag (e.g. `v2.0.0`).
# Builds the dnd-app on Windows + Linux runners in parallel and uploads
# artifacts to a GitHub Release.
#
# Ollama bundling: Windows only. Linux AppImage exceeds GitHub Releases'
# 2 GiB single-asset cap when Ollama is bundled, so Linux ships a small
# (~150 MB) AppImage and the user installs Ollama via the official script
# (`curl -fsSL https://ollama.com/install.sh | sh`); the app auto-detects
# it on next launch.
#
# Auto-update wires up via electron-builder's `latest.yml` / `latest-linux.yml`
# files which are emitted alongside each artifact and uploaded as part of the
# same release; electron-updater on the user's machine reads them on next
# launch and offers the upgrade.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            release-script: release
          - os: ubuntu-latest
            release-script: release:linux
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: dnd-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dnd-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Bundles the full Ollama distribution (binary + GPU runner libs) into
      # resources/ollama/windows/ so electron-builder's win.extraResources
      # picks it up. Windows only — Linux AppImage exceeds GitHub's 2 GiB
      # asset cap with Ollama bundled. Linux users install Ollama themselves
      # via the official script.
      - name: Bundle Ollama (Windows)
        if: matrix.os == 'windows-latest'
        run: node scripts/build/fetch-ollama.mjs --platform=windows

      # AppImage build needs GTK and friends on the runner so the bundled
      # binary can launch its smoke-test. Ubuntu runners ship most of these;
      # this step is a sanity-check no-op when already present. Skipped on Windows.
      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0
        working-directory: .

      - name: Build & publish
        env:
          # Auto-injected by Actions; electron-builder picks it up for `--publish always`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.release-script }}

      # Adds the one-line installer script to the release alongside the
      # AppImage so users can `curl -fsSL .../install-linux.sh | bash`.
      # Linux runner only — uploads once per release (Windows would clobber
      # the same asset with the same content). Runs after publish so the
      # release exists.
      - name: Upload Linux install script
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" scripts/build/install-linux.sh --clobber

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dnd-app/dist/*.exe
            dnd-app/dist/*.AppImage
            dnd-app/dist/*.yml
            dnd-app/dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
