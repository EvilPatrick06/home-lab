# WebRTC noise suppression for BMO mic input
context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.description = "BMO Noise Suppressed Mic"
            media.name       = "BMO Noise Suppressed Mic"
            filter.graph = {
                nodes = [
                    {
                        type  = spa
                        name  = aec
                        factory = aec/webrtc
                        props = {
                            webrtc.extended_filter = true
                            webrtc.noise_suppression = true
                            webrtc.gain_control = false
                            webrtc.voice_detection = true
                        }
                    }
                ]
                inputs  = [ "aec:Capture_1" ]
                outputs = [ "aec:Playback_1" ]
            }
            capture.props = {
                node.name         = "bmo_capture"
                audio.position    = [ MONO ]
                stream.dont-remix = true
                node.passive      = true
            }
            playback.props = {
                node.name         = "bmo_playback"
                media.class       = "Audio/Source"
                audio.position    = [ MONO ]
            }
        }
    }
]
